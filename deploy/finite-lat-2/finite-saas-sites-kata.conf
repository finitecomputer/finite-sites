# Drop-in for the Kata app runner. Install as
# /etc/systemd/system/finite-saas-sites.service.d/kata.conf
#
# The base unit hardens the daemon's own filesystem (ProtectSystem=strict,
# NoNewPrivileges). The Kata runner spawns `sudo nerdctl`, which needs to
# write containerd/CNI state and run with privileges — both blocked by that
# hardening. We relax it here because, with Kata, tenant isolation lives at
# the microVM boundary (hardware-level, strictly stronger than the daemon
# sandbox it replaces). The daemon still runs as the unprivileged
# finite-sites user; the sudo-nerdctl capability is the one root path, and
# it is gated to nerdctl alone (finite-sites-nerdctl-sudoers).
[Service]
NoNewPrivileges=no
ProtectSystem=off
ProtectHome=off
PrivateTmp=no
ReadWritePaths=
