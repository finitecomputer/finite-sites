name: Release fsite

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            asset_name: fsite-linux-x86_64
            target: x86_64-unknown-linux-gnu
          - runs_on: macos-14
            asset_name: fsite-macos-aarch64
            target: aarch64-apple-darwin
          - runs_on: macos-14
            asset_name: fsite-macos-x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add "${{ matrix.target }}"

      - name: Build fsite
        run: cargo build --locked --release --target "${{ matrix.target }}" --package fsite-cli --bin fsite

      - name: Package fsite
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fsite" dist/fsite
          tar -C dist -czf "${{ matrix.asset_name }}.tar.gz" fsite
          shasum -a 256 "${{ matrix.asset_name }}.tar.gz" > "${{ matrix.asset_name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" release-assets/* --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi
